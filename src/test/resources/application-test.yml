spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Still validate — Flyway runs the schema in tests too
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Disable Redis for tests — use mocks instead
  spring:
    data:
      redis:
        repositories:
          enabled: false

logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG