server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smilingwallet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    hibernate:
      ddl-auto: validate          # Hibernate validates schema against entities — Flyway owns DDL
    show-sql: true
    properties:
      hibernate:
        #dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms


logging:
  level:

    org.flywaydb: DEBUG           # Helpful to see migration execution order
    org.flywaydb.core.internal.scanner: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE